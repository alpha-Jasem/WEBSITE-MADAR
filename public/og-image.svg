<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810"/>
      <stop offset="100%" style="stop-color:#0D1B3E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0099CC"/>
      <stop offset="100%" style="stop-color:#00BFFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(0,191,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orb -->
  <ellipse cx="600" cy="200" rx="400" ry="200" fill="rgba(0,191,255,0.07)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" opacity="0.6"/>

  <!-- MADAR text -->
  <text x="600" y="260" font-family="Arial, sans-serif" font-size="96" font-weight="900"
    fill="white" text-anchor="middle" letter-spacing="20" filter="url(#glow)"
    style="text-shadow: 0 0 60px rgba(0,191,255,0.8)">MADAR</text>

  <!-- Subtitle -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="22"
    fill="rgba(0,191,255,0.8)" text-anchor="middle" letter-spacing="6">AI AUTOMATION</text>

  <!-- Divider -->
  <rect x="500" y="345" width="200" height="1" fill="url(#accent)" opacity="0.5"/>

  <!-- Description AR -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="28"
    fill="rgba(255,255,255,0.75)" text-anchor="middle">أتمتة الأعمال بالذكاء الاصطناعي</text>

  <!-- Description EN -->
  <text x="600" y="445" font-family="Arial, sans-serif" font-size="20"
    fill="rgba(255,255,255,0.45)" text-anchor="middle">WhatsApp Automation · AI Agents · CRM · Mobile Apps</text>

  <!-- Domain -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="18"
    fill="rgba(0,191,255,0.6)" text-anchor="middle" letter-spacing="2">madar.software</text>

  <!-- Corner dots -->
  <circle cx="60" cy="60" r="3" fill="rgba(0,191,255,0.3)"/>
  <circle cx="1140" cy="60" r="3" fill="rgba(0,191,255,0.3)"/>
  <circle cx="60" cy="570" r="3" fill="rgba(0,191,255,0.3)"/>
  <circle cx="1140" cy="570" r="3" fill="rgba(0,191,255,0.3)"/>
</svg>
