<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aeon — Venture Past Our Sky</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Instrument Serif', 'serif'],
            body: ['Barlow', 'sans-serif'],
          },
          borderRadius: { DEFAULT: '9999px' },
        },
      },
    };
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
  <script>window.Motion = window.FramerMotion || window.Motion;</script>

  <style>
    html, body { margin: 0; padding: 0; background: #000; }
    #root { background: #000; }

    .liquid-glass {
      background: rgba(255, 255, 255, 0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .liquid-glass-strong {
      background: rgba(255, 255, 255, 0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    // suppress benign framer-motion list-key dev warnings
    const _err = console.error;
    console.error = (...a) => { if (typeof a[0] === 'string' && a[0].includes('unique "key"')) return; _err(...a); };

    const { useRef, useEffect, useState } = React;
    const M = (window.Motion || window.FramerMotion).motion;

    /* ── Icons ── */
    const ArrowUpRight = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M7 17L17 7" /><path d="M7 7h10v10" />
      </svg>
    );
    const Play = ({ className }) => (
      <svg className={className} viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4" /></svg>
    );

    /* ── FadingVideo: rAF-driven crossfade, manual loop ── */
    const FADE_MS = 500;
    const FADE_OUT_LEAD = 0.55;
    function FadingVideo({ src, className, style }) {
      const ref = useRef(null);
      const rafRef = useRef(null);
      const fadingOutRef = useRef(false);

      useEffect(() => {
        const v = ref.current;
        if (!v) return;

        const fadeTo = (target, duration) => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          const start = parseFloat(v.style.opacity || '0');
          const t0 = performance.now();
          const step = (now) => {
            const p = Math.min((now - t0) / duration, 1);
            v.style.opacity = String(start + (target - start) * p);
            if (p < 1) rafRef.current = requestAnimationFrame(step);
          };
          rafRef.current = requestAnimationFrame(step);
        };

        const onLoaded = () => { v.style.opacity = '0'; v.play().catch(() => {}); fadeTo(1, FADE_MS); };
        const onTime = () => {
          if (!fadingOutRef.current && v.duration) {
            const left = v.duration - v.currentTime;
            if (left <= FADE_OUT_LEAD && left > 0) { fadingOutRef.current = true; fadeTo(0, FADE_MS); }
          }
        };
        const onEnded = () => {
          v.style.opacity = '0';
          setTimeout(() => { v.currentTime = 0; v.play().catch(() => {}); fadingOutRef.current = false; fadeTo(1, FADE_MS); }, 100);
        };

        v.addEventListener('loadeddata', onLoaded);
        v.addEventListener('timeupdate', onTime);
        v.addEventListener('ended', onEnded);
        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          v.removeEventListener('loadeddata', onLoaded);
          v.removeEventListener('timeupdate', onTime);
          v.removeEventListener('ended', onEnded);
        };
      }, []);

      return <video ref={ref} src={src} autoPlay muted playsInline preload="auto" className={className} style={{ opacity: 0, ...style }} />;
    }

    /* ── BlurText: word-by-word blur-in on view ── */
    function BlurText({ text, className }) {
      const ref = useRef(null);
      const [inView, setInView] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setInView(true); obs.disconnect(); } }, { threshold: 0.1 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      const words = text.split(' ');
      return (
        <p ref={ref} className={className} style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}>
          {words.map((w, i) => (
            <M.span key={i}
              style={{ display: 'inline-block', marginRight: '0.28em' }}
              initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
              animate={inView ? { filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'], opacity: [0, 0.5, 1], y: [50, -5, 0] } : {}}
              transition={{ duration: 0.7, times: [0, 0.5, 1], ease: 'easeOut', delay: (i * 100) / 1000 }}>
              {w}
            </M.span>
          ))}
        </p>
      );
    }

    const enter = (delay) => ({
      initial: { filter: 'blur(10px)', opacity: 0, y: 20 },
      animate: { filter: 'blur(0px)', opacity: 1, y: 0 },
      transition: { duration: 0.7, ease: 'easeOut', delay },
    });

    /* ── Navbar ── */
    function Navbar() {
      const links = ['Home', 'Voyages', 'Worlds', 'Innovation', 'Plan Launch'];
      return (
        <nav className="fixed top-4 left-0 right-0 z-50 px-8 lg:px-16">
          <div className="flex items-center justify-between">
            <div className="liquid-glass w-12 h-12 rounded-full flex items-center justify-center">
              <span className="font-heading italic text-white text-2xl leading-none">a</span>
            </div>
            <div className="hidden lg:flex items-center liquid-glass rounded-full px-1.5 py-1.5">
              {links.map((l) => (
                <a key={l} href="#" className="px-3 py-2 text-sm font-medium text-white/90 font-body">{l}</a>
              ))}
              <button className="ml-1 flex items-center gap-1.5 bg-white text-black rounded-full px-4 py-2 text-sm font-medium font-body whitespace-nowrap">
                Claim a Spot <ArrowUpRight className="h-4 w-4" />
              </button>
            </div>
            <div className="w-12 h-12" />
          </div>
        </nav>
      );
    }

    /* ── Hero ── */
    function Hero() {
      return (
        <section className="relative min-h-screen w-full overflow-hidden bg-black">
          <FadingVideo
            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4"
            className="absolute left-1/2 top-0 -translate-x-1/2 object-cover object-top z-0"
            style={{ width: '120%', height: '120%' }}
          />
          <div className="relative z-10 flex flex-col min-h-screen">
            <Navbar />

            <div className="flex-1 flex flex-col items-center justify-center text-center pt-24 px-4">
              <M.div {...enter(0.4)} className="liquid-glass rounded-full flex items-center gap-2 pl-1 pr-3 py-1">
                <span className="bg-white text-black rounded-full px-3 py-1 text-xs font-semibold font-body">New</span>
                <span className="text-sm text-white/90 font-body">Maiden Crewed Voyage to Mars Arrives 2026</span>
              </M.div>

              <div className="mt-6">
                <BlurText
                  text="Venture Past Our Sky Across the Universe"
                  className="text-6xl md:text-7xl lg:text-[5.5rem] font-heading italic text-white leading-[0.8] max-w-2xl tracking-[-4px]"
                />
              </div>

              <M.p {...enter(0.8)} className="mt-4 text-sm md:text-base text-white max-w-2xl font-body font-light leading-tight">
                Discover the universe in ways once unimaginable. Our pioneering vessels and breakthrough engineering bring deep-space exploration within reach—secure and extraordinary.
              </M.p>

              <M.div {...enter(1.1)} className="flex items-center gap-6 mt-6">
                <button className="liquid-glass-strong rounded-full flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-white font-body">
                  Start Your Voyage <ArrowUpRight className="h-5 w-5" />
                </button>
                <button className="flex items-center gap-2 text-sm font-medium text-white font-body">
                  View Liftoff <Play className="h-4 w-4" />
                </button>
              </M.div>

              <M.div {...enter(1.3)} className="flex items-stretch gap-4 mt-8">
                <div className="liquid-glass p-5 w-[220px] rounded-[1.25rem] text-left">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="text-white">
                    <circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                  <div className="text-4xl font-heading italic text-white tracking-[-1px] leading-none mt-6">34.5 Min</div>
                  <div className="text-xs text-white font-body font-light mt-2">Average Videos Watch Time</div>
                </div>
                <div className="liquid-glass p-5 w-[220px] rounded-[1.25rem] text-left">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="text-white">
                    <circle cx="12" cy="12" r="9" /><path d="M3 12h18" /><path d="M12 3a15 15 0 0 1 0 18a15 15 0 0 1 0-18" />
                  </svg>
                  <div className="text-4xl font-heading italic text-white tracking-[-1px] leading-none mt-6">2.8B+</div>
                  <div className="text-xs text-white font-body font-light mt-2">Users Across the Globe</div>
                </div>
              </M.div>
            </div>

            <M.div {...enter(1.4)} className="flex flex-col items-center gap-4 pb-8">
              <div className="liquid-glass rounded-full px-3.5 py-1 text-xs font-medium text-white font-body">
                Collaborating with top aerospace pioneers globally
              </div>
              <div className="flex items-center gap-12 md:gap-16">
                {['Aeon', 'Vela', 'Apex', 'Orbit', 'Zeno'].map((n) => (
                  <span key={n} className="font-heading italic text-white text-2xl md:text-3xl tracking-tight">{n}</span>
                ))}
              </div>
            </M.div>
          </div>
        </section>
      );
    }

    /* ── Capabilities ── */
    const CARDS = [
      {
        icon: 'M5 21q-.825 0-1.412-.587T3 19V5q0-.825.588-1.412T5 3h14q.825 0 1.413.588T21 5v14q0 .825-.587 1.413T19 21H5Zm1-4h12l-3.75-5-3 4L9 13l-3 4Z',
        tags: ['Natural Context', 'Photo Realism', 'Infinite Settings', 'Eco-Vibe'],
        title: 'AI Scenery',
        body: 'AI analyzes your product to create indistinguishable natural environments — from Icelandic cliffs to misty forests.',
      },
      {
        icon: 'M4 6.47 5.76 10H20v8H4V6.47M22 4h-4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.89-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4Z',
        tags: ['Scale Fast', 'Visual Consistency', 'Time Saver', 'Ready to Post'],
        title: 'Batch Production',
        body: 'Style your entire product line in minutes. Create a unified visual identity for catalogues and social media without weeks of retouching.',
      },
      {
        icon: 'M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1Zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7Z',
        tags: ['Ray Tracing', 'Physical Shadows', 'Studio Quality', 'Sunlight Sync'],
        title: 'Smart Lighting',
        body: 'Automatic lighting and material adjustment. Achieve flawless integration with realistic shadows and sunlight.',
      },
    ];

    function Capabilities() {
      return (
        <section className="relative min-h-screen w-full overflow-hidden bg-black">
          <FadingVideo
            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_094631_d30ab262-45ee-4b7d-99f3-5d5848c8ef13.mp4"
            className="absolute inset-0 w-full h-full object-cover z-0"
          />
          <div className="relative z-10 px-8 md:px-16 lg:px-20 pt-24 pb-10 flex flex-col min-h-screen">
            <div className="mb-auto">
              <div className="text-sm font-body text-white/80 mb-6">// Capabilities</div>
              <h2 className="font-heading italic text-white text-6xl md:text-7xl lg:text-[6rem] leading-[0.9] tracking-[-3px]">
                Production<br />evolved
              </h2>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-16">
              {CARDS.map((c) => (
                <div key={c.title} className="liquid-glass rounded-[1.25rem] p-6 min-h-[360px] flex flex-col">
                  <div className="flex items-start justify-between gap-4">
                    <div className="liquid-glass w-11 h-11 rounded-[0.75rem] flex items-center justify-center shrink-0">
                      <svg viewBox="0 0 24 24" fill="currentColor" className="h-6 w-6 text-white"><path d={c.icon} /></svg>
                    </div>
                    <div className="flex flex-wrap justify-end gap-1.5 max-w-[70%]">
                      {c.tags.map((t) => (
                        <span key={t} className="liquid-glass rounded-full px-3 py-1 text-[11px] text-white/90 font-body whitespace-nowrap">{t}</span>
                      ))}
                    </div>
                  </div>
                  <div className="flex-1" />
                  <div className="mt-6">
                    <h3 className="font-heading italic text-white text-3xl md:text-4xl tracking-[-1px] leading-none">{c.title}</h3>
                    <p className="mt-3 text-sm text-white/90 font-body font-light leading-snug max-w-[32ch]">{c.body}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function App() {
      return (<><Hero /><Capabilities /></>);
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
